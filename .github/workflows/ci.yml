name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==================== CI (Build & Test) ====================
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Run Tests
        run: mvn test

  # ==================== CD (Deploy to Render) ====================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        # Render has its own auto-deploy mechanism linked directly to GitHub. 
        # However, if you want to trigger a specific deploy hook, you can use curl.
        # This requires setting a RENDER_DEPLOY_HOOK_URL secret in GitHub.
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Triggered Render deployment via webhook."
          else
            echo "No RENDER_DEPLOY_HOOK_URL secret found. Assuming auto-deploy is configured in Render dashboard."
          fi
