<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #main-container { display: flex; height: 100%; }
        .sidebar { width: 300px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; z-index: 1000; overflow-y: auto; }
        #map { flex: 1; height: 100%; position: relative; }
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 1001; display: flex; flex-direction: column; gap: 10px; }
        .search-box-wrapper { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); width: 350px; display: flex; align-items: center; overflow: hidden; }
        .leaflet-control-geocoder { box-shadow: none; border: none; margin: 0; width: 100%; }
        .leaflet-control-geocoder-form input { width: 100%; border: none; padding: 12px 15px; font-size: 15px; outline: none; height: 45px; }
        .leaflet-control-geocoder-icon { display: none; }
        #instruction-panel { background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 13px; color: #5f6368; width: 326px; text-align: center; }
        h2 { margin-top: 0; color: #202124; font-size: 1.1em; font-weight: 500; }
        .btn { padding: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 500; width: 100%; margin-bottom: 8px; transition: 0.2s; text-transform: uppercase; font-size: 13px; }
        .btn-primary { background: #1a73e8; color: white; } .btn-danger { background: #d93025; color: white; } .btn-success { background: #1e8e3e; color: white; }
        .btn-warning { background: #f39c12; color: white; } .btn-info { background: #00bcd4; color: white; } .btn-secondary { background: #f1f3f4; color: #3c4043; }
        .log-panel { background: #f1f3f4; padding: 10px; border-radius: 8px; flex-grow: 1; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .log-entry { border-bottom: 1px solid #dadce0; padding: 4px 0; }
        .traffic-list { max-height: 400px; overflow-y: auto; }
        .traffic-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .traffic-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-red, .icon-red { background: #d93025; } .dot-green, .icon-green { background: #1e8e3e; } .dot-yellow, .icon-yellow { background: #f39c12; }
        .icon-green, .icon-yellow { box-shadow: 0 0 8px currentColor; }
        .traffic-icon { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px; }
        .ambulance-icon { font-size: 28px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); text-align: center; line-height: 30px; margin: 0; padding: 0; }
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; margin-right: 10px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #1a73e8; } input:checked + .slider:before { transform: translateX(20px); }
        .user-info { background-color: #e8eaed; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: 0.3s; z-index: 2000; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        .context-menu-btn { display: block; width: 100%; text-align: left; padding: 8px 10px; margin-bottom: 5px; border: none; border-radius: 4px; cursor: pointer; background: #f1f3f4; font-size: 13px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="map"><div id="search-container"></div></div>

    <div class="sidebar">
        <div class="user-info" id="userInfoDisplay"></div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
        <h2>🚑 Controls</h2>
        <div style="display:flex; align-items:center; margin-bottom:15px; font-size:14px;">
            <label class="toggle-switch"><input type="checkbox" id="trafficToggle" onchange="baseLayer.setUrl(`https://{s}.google.com/vt/lyrs=m${this.checked?',traffic':''}&x={x}&y={y}&z={z}`); log(`🚦 Traffic Layer: ${this.checked?'ON':'OFF'}`);"><span class="slider"></span></label>
            <span>Show Live Traffic</span>
        </div>
        <div>
            <button class="btn btn-info" onclick="manualDetectLights()">🔍 Detect Lights</button>
            <button class="btn btn-primary" onclick="manualStart()">🚀 Start Navigation</button>
            <button class="btn btn-danger" onclick="resetMap()">❌ Clear Route</button>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <button class="btn btn-warning" id="addSimLightBtn" onclick="toggleAddLightMode()">➕ Add Random Signal</button>
        </div>
        <div style="margin-top: 5px;">
            <label style="font-size: 12px; color: #5f6368;">Traffic Density Simulation</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button class="btn btn-danger" style="flex:1" onclick="setDensity('HIGH')">High</button>
                <button class="btn btn-success" style="flex:1" onclick="setDensity('LOW')">Low</button>
            </div>
            <div style="margin-top: 5px; font-size: 13px;">Speed: <strong id="speedVal">Auto</strong></div>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; width: 100%;">
        <h2>🚦 Traffic Lights (<span id="lightCount">0</span>)</h2>
        <div id="traffic-list" class="traffic-list"></div>
        <h2>📜 Activity Log</h2>
        <div id="activity-log" class="log-panel"></div>
    </div>
</div>
<div id="toast"></div>

<script>
    const API = 'http://localhost:8080/api';
    let map, routingControl, baseLayer, startMarker, endMarker, ambulanceMarker, animId, pollInterval;
    let routeCoords = [], routeInsts = [], detectedLights = [], trafficMarkers = {};
    let currentDensity = "LOW", isAddLightMode = false, user = JSON.parse(localStorage.getItem('currentUser'));

    if (!user) window.location.href = 'login.html';
    document.getElementById('userInfoDisplay').innerHTML = `<strong>${user.username}</strong><br>${user.vehicleType === 'POLICE'?'🚓':user.vehicleType==='FIRE_TRUCK'?'🚒':'🚑'} ${user.vehicleType}<br>Reg: ${user.registrationNumber}`;

    const log = msg => document.getElementById('activity-log').insertAdjacentHTML('afterbegin', `<div class="log-entry">[${new Date().toLocaleTimeString()}] ${msg}</div>`);
    const showToast = msg => { const t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => t.className = "", 3000); };
    const apiCall = async (end, method='GET', body) => {
        try { const r = await fetch(API+end, { method, headers: {'Content-Type': 'application/json'}, body: body ? JSON.stringify(body) : null }); return method==='GET'? await r.json() : null; } catch(e) {}
    };

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([30.7333, 76.7794], 13);
        L.control.zoom({position: 'bottomright'}).addTo(map);
        baseLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3']}).addTo(map);

        const sc = document.getElementById('search-container');
        ['Start', 'Destination'].forEach(t => {
            const w = document.createElement('div'); w.className = 'search-box-wrapper';
            w.appendChild(L.Control.geocoder({placeholder: `Choose ${t}...`, defaultMarkGeocode: false})
                .on('markgeocode', e => setMarker(t.toLowerCase(), e.geocode.center, t)).onAdd(map));
            sc.appendChild(w);
        });
        sc.insertAdjacentHTML('beforeend', '<div id="instruction-panel">Use search boxes or right-click to set start/destination.</div>');

        map.on('click', e => isAddLightMode ? addCustomLight(e.latlng) : (!startMarker ? setMarker('start', e.latlng, 'Start') : (!endMarker && setMarker('destination', e.latlng, 'Destination'))));
        map.on('contextmenu', e => !isAddLightMode && L.popup().setLatLng(e.latlng).setContent(`
            <button class="context-menu-btn" onclick="setMarker('start', [${e.latlng.lat}, ${e.latlng.lng}], 'Start'); map.closePopup()">📍 Start here</button>
            <button class="context-menu-btn" onclick="setMarker('destination', [${e.latlng.lat}, ${e.latlng.lng}], 'Destination'); map.closePopup()">🏁 Destination here</button>
        `).openOn(map));
    }

    function setMarker(type, latlng, title) {
        if (type === 'start') { startMarker?.remove(); startMarker = L.marker(latlng, {draggable:true}).addTo(map).bindPopup(title).openPopup(); }
        else { endMarker?.remove(); endMarker = L.marker(latlng, {draggable:true}).addTo(map).bindPopup(title).openPopup(); }
        log(`📍 ${title} set.`);
        if (startMarker && endMarker) calculateRoute();
    }

    function calculateRoute() {
        if (routingControl) map.removeControl(routingControl);
        log("🔄 Calculating route...");
        routingControl = L.Routing.control({ waypoints: [startMarker.getLatLng(), endMarker.getLatLng()], show: false, createMarker: ()=>null, lineOptions: {styles: [{color:'#4285F4', weight:5}]} })
            .on('routesfound', e => {
                routeCoords = e.routes[0].coordinates; routeInsts = e.routes[0].instructions;
                log(`🛣️ Route: ${(e.routes[0].summary.totalDistance / 1000).toFixed(1)} km. Click 'Detect Lights'.`);
            }).addTo(map);
    }

    async function autoDetectLights() {
        log("🔍 Scanning for traffic lights...");
        const b = L.latLngBounds(routeCoords), query = `[out:json][timeout:25];(node["highway"="traffic_signals"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}););out body;`;
        let lights = [];
        try {
            const res = await (await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)).json();
            lights = res.elements.filter(n => isNearRoute(L.latLng(n.lat, n.lon))).map(n => ({ id: `r-${n.id}`, name: `Signal ${n.id}`, location: {latitude: n.lat, longitude: n.lon}, status: "RED" }));
        } catch (e) {}

        routeInsts.forEach((inst, i) => {
            if (['Right', 'Left', 'SharpRight', 'SharpLeft'].includes(inst.type) && routeCoords[inst.index]) {
                const ll = routeCoords[inst.index];
                if (!lights.some(l => L.latLng(l.location.latitude, l.location.longitude).distanceTo(ll) < 150))
                    lights.push({ id: `i-${i}`, name: inst.road ? `Signal at ${inst.road}` : `Intersection ${i}`, location: {latitude: ll.lat, longitude: ll.lng}, status: "RED" });
            }
        });

        detectedLights = lights;
        log(lights.length ? `✅ Auto-configured ${lights.length} signals.` : "⚠️ No signals found.");
        await apiCall('/traffic-lights/reset', 'POST');
        if (lights.length) await apiCall('/traffic-lights/batch', 'POST', lights);
        fetchTraffic();
    }

    function isNearRoute(p) { return routeCoords.some(c => p.distanceTo(c) < 150); }
    
    async function manualDetectLights() { routeCoords.length ? await autoDetectLights() : alert("Select Start/End points first!"); }
    async function manualStart() {
        if (!routeCoords.length || !detectedLights.length) return alert("Select route and detect lights first!");
        await apiCall('/route', 'POST', routeCoords.map(c => ({latitude: c.lat, longitude: c.lng})));
        startSimulation();
    }

    function toggleAddLightMode() {
        isAddLightMode = !isAddLightMode;
        document.getElementById('addSimLightBtn').style.background = isAddLightMode ? '#2ecc71' : '#f39c12';
        document.getElementById('map').style.cursor = isAddLightMode ? 'crosshair' : '';
    }
    
    async function addCustomLight(ll) {
        detectedLights.push({ id: `c-${Date.now()}`, name: `Custom Signal`, location: {latitude: ll.lat, longitude: ll.lng}, status: "RED" });
        await apiCall('/traffic-lights/reset', 'POST'); await apiCall('/traffic-lights/batch', 'POST', detectedLights);
        toggleAddLightMode(); fetchTraffic();
    }

    function startSimulation() {
        cancelAnimationFrame(animId);
        let idx = 0, prog = 0, lastT = performance.now(), lastNet = lastT;
        log("🚑 Emergency Vehicle started.");

        function anim(t) {
            if (idx >= routeCoords.length - 1) return log("🏁 Reached destination.");
            let dt = t - lastT; lastT = t;
            let spd = currentDensity === "HIGH" ? 30 : 80;
            document.getElementById('speedVal').innerText = spd + " km/h";
            let dist = (spd / 3.6) * (dt / 1000);

            while (dist > 0 && idx < routeCoords.length - 1) {
                let p1 = L.latLng(routeCoords[idx]), p2 = L.latLng(routeCoords[idx+1]), d = p1.distanceTo(p2);
                if (d < 0.1) { idx++; prog = 0; continue; }
                let rem = d * (1 - prog);
                if (dist < rem) { prog += dist / d; dist = 0; } else { dist -= rem; prog = 0; idx++; }
            }

            if (idx < routeCoords.length - 1) {
                let p1 = routeCoords[idx], p2 = routeCoords[idx+1];
                let lat = p1.lat + (p2.lat - p1.lat)*prog, lng = p1.lng + (p2.lng - p1.lng)*prog;
                
                if (!ambulanceMarker) {
                    const iconHtml = user?.vehicleType === 'POLICE' ? '🚓' : user?.vehicleType === 'FIRE_TRUCK' ? '🚒' : '🚑';
                    ambulanceMarker = L.marker([lat, lng], {icon: L.divIcon({className: '', html: `<div class="ambulance-icon">${iconHtml}</div>`, iconSize: [30,30], iconAnchor: [15,15]}), zIndexOffset: 1000}).addTo(map);
                } else ambulanceMarker.setLatLng([lat, lng]);
                map.setView([lat, lng], map.getZoom(), {animate: false});

                if (t - lastNet > 1000) { apiCall('/ambulance/location', 'POST', {latitude: lat, longitude: lng, timestamp: Date.now()}); lastNet = t; }
                animId = requestAnimationFrame(anim);
            } else log("🏁 Reached destination.");
        }
        animId = requestAnimationFrame(anim);
        if(pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(fetchTraffic, 1000);
    }

    async function fetchTraffic() {
        let lights = await apiCall('/traffic-lights');
        if(lights) { detectedLights = lights; updateUI(); }
    }

    function updateUI() {
        document.getElementById('lightCount').innerText = detectedLights.length;
        document.getElementById('traffic-list').innerHTML = detectedLights.length ? detectedLights.map(l => {
            const col = l.status === 'GREEN' ? 'green' : l.status === 'YELLOW' ? 'yellow' : 'red';
            const tm = l.timer > 0 ? l.timer : '';
            
            const icon = L.divIcon({className: 'leaflet-div-icon', html: `<div class="traffic-icon icon-${col}">${tm}</div>`, iconSize: [24,24]});
            if (trafficMarkers[l.id]) trafficMarkers[l.id].setIcon(icon);
            else trafficMarkers[l.id] = L.marker([l.location.latitude, l.location.longitude], {icon}).addTo(map).bindPopup(l.name);
            
            return `<div class="traffic-item">
                <div style="display:flex; align-items:center;"><span class="traffic-dot dot-${col}"></span><span style="font-weight:500;">${l.name}</span></div>
                <div style="text-align: right;"><span style="font-size:12px; font-weight:bold; color:#3c4043;">${l.status} ${tm?`(${tm}s)`:''}</span></div>
            </div>`;
        }).join('') : '<div style="padding:10px; color:#70757a; font-size:13px;">No signals detected.</div>';
    }

    function resetMap() {
        [startMarker, endMarker, ambulanceMarker, routingControl].forEach(m => m?.remove());
        Object.values(trafficMarkers).forEach(m => m.remove());
        cancelAnimationFrame(animId); clearInterval(pollInterval);
        startMarker = endMarker = ambulanceMarker = routingControl = null;
        trafficMarkers = {}; routeCoords = []; detectedLights = []; updateUI(); log("Map reset.");
    }

    async function setDensity(d) { currentDensity = d; await apiCall('/traffic/config', 'POST', {density: d}); log(`Speed adjusted for ${d} density.`); }

    initMap();
</script>
</body>
</html>
